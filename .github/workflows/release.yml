name: Publish launcher release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version without v prefix, e.g. 0.12.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Verify requested version matches source
        shell: pwsh
        run: |
          $SourceVersion = python -c "from futonhub_auto import LAUNCHER_VERSION; print(LAUNCHER_VERSION)"
          if ($SourceVersion.Trim() -ne "${{ inputs.version }}") {
            throw "Requested version ${{ inputs.version }} does not match source version $SourceVersion"
          }
      - name: Install build dependencies
        run: python -m pip install --disable-pip-version-check -r requirements_build.txt
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Compile sources
        run: python -m compileall -q main.py futonhub_auto
      - name: Build Windows executable
        shell: cmd
        env:
          CI: "true"
        run: build_launcher.bat
      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $Tag = "launcher-v${{ inputs.version }}"
          gh release create $Tag `
            "dist/FutonHUB-Launcher.exe" `
            "dist/FutonHUB-Launcher.exe.sha256" `
            --repo "${{ github.repository }}" `
            --target "${{ github.sha }}" `
            --title "FutonHUB Launcher ${{ inputs.version }}" `
            --generate-notes
