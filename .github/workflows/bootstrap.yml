name: Bootstrap LAUNCH-012 source

on:
  push:
    branches: [main]
    paths:
      - "bootstrap/**"
      - ".github/workflows/bootstrap.yml"

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reconstruct source archive
        shell: bash
        run: |
          cat bootstrap/part-*.txt > /tmp/source.tar.gz.b64
          base64 -d /tmp/source.tar.gz.b64 > /tmp/source.tar.gz
          tar -xzf /tmp/source.tar.gz -C .

      - name: Replace bootstrap files with source
        shell: bash
        run: |
          rm -rf bootstrap
          rm -f .github/workflows/bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: initialize FutonHUB Launcher 0.12.0"
          git push
